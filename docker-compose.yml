services:
  postgres:
    image: postgres:16
    container_name: ahadu-postgres
    environment:
      POSTGRES_DB: ahadu_db
      POSTGRES_USER: ahadu_user
      POSTGRES_PASSWORD: addis41
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: