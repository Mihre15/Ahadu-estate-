services:
  postgres:
    image: postgres:16
    container_name: ahadu-postgres
    environment:
      POSTGRES_DB: ahadu_db
      POSTGRES_USER: ahadu_user
      POSTGRES_PASSWORD: addis41
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.10
    container_name: ahadu-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

volumes:
  postgres-data:
  elasticsearch-data:
