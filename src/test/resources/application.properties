spring.application.name=app
jwt.secret=yoursupersecretkeythatisatleast32characterslong
jwt.expiration=86400000

spring.datasource.url=jdbc:h2:mem:ahadu_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=false
logging.level.org.springframework.security=WARN

