<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title th:text="${listing.title + ' | Ahadu Real Estate'}">Listing Details</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&family=Material+Symbols+Outlined&display=swap" rel="stylesheet" />
</head>
<body class="bg-[#fbfaf7] text-slate-900 font-[Inter]">
<header th:replace="~{fragments :: navbar}"></header>
<main class="mx-auto max-w-7xl px-5 py-10 lg:px-10">
    <div th:if="${success}" class="mb-6 rounded-lg bg-teal-50 px-4 py-3 font-medium text-teal-800" th:text="${success}"></div>
    <div th:if="${error}" class="mb-6 rounded-lg bg-red-50 px-4 py-3 font-medium text-red-700" th:text="${error}"></div>

    <section class="grid gap-8 lg:grid-cols-[1.35fr_0.65fr]">
        <div>
            <img class="h-[320px] w-full rounded-lg object-cover md:h-[520px]" th:src="${listing.image != null and !listing.image.isBlank() ? listing.image : 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1400&q=80'}" alt="Property image" />
            <div class="mt-8 rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
                <div class="flex flex-wrap gap-2">
                    <span class="rounded-full bg-teal-50 px-3 py-1 text-sm font-bold text-teal-800" th:text="${listing.listingStatus ?: 'For Sale'}">For Sale</span>
                    <span class="rounded-full bg-slate-100 px-3 py-1 text-sm font-bold text-slate-700" th:text="${listing.propertyType ?: 'Property'}">Villa</span>
                </div>
                <h1 class="mt-4 text-4xl font-extrabold font-[Montserrat]" th:text="${listing.title}">Property title</h1>
                <p class="mt-3 text-slate-500" th:text="${listing.address + ', ' + listing.city}">Address</p>
                <p class="mt-6 whitespace-pre-line leading-8 text-slate-700" th:text="${listing.description}">Description</p>
            </div>
        </div>
        <aside class="space-y-5">
            <div class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
                <p class="text-sm font-bold uppercase tracking-wide text-slate-500">Price</p>
                <p class="mt-2 text-3xl font-extrabold text-teal-700" th:text="${#numbers.formatDecimal(listing.price, 0, 'COMMA', 2, 'POINT')}">0</p>
                <div class="mt-6 grid grid-cols-3 gap-3 text-center">
                    <div class="rounded-lg bg-slate-50 p-3"><p class="font-bold" th:text="${listing.bedrooms ?: 0}">0</p><p class="text-xs text-slate-500">Beds</p></div>
                    <div class="rounded-lg bg-slate-50 p-3"><p class="font-bold" th:text="${listing.bathrooms ?: 0}">0</p><p class="text-xs text-slate-500">Baths</p></div>
                    <div class="rounded-lg bg-slate-50 p-3"><p class="font-bold" th:text="${listing.area ?: 0}">0</p><p class="text-xs text-slate-500">Sqft</p></div>
                </div>
                <form th:if="${isLoggedIn == true}" th:action="@{/listings/{id}/request(id=${listing.id})}" method="post" class="mt-6">
                    <button class="flex w-full items-center justify-center gap-2 rounded-lg bg-teal-700 px-5 py-3 font-bold text-white hover:bg-teal-800" type="submit">
                        <span class="material-symbols-outlined">real_estate_agent</span>
                        Request this listing
                    </button>
                </form>
                <a th:if="${isLoggedIn == false}" th:href="@{/login}" class="mt-6 flex w-full items-center justify-center rounded-lg bg-teal-700 px-5 py-3 font-bold text-white hover:bg-teal-800">Login to request</a>
            </div>
            <div class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
                <p class="text-sm font-bold uppercase tracking-wide text-slate-500">Listing agent</p>
                <h2 class="mt-2 text-xl font-bold" th:text="${listing.agent != null && listing.agent.name != null ? listing.agent.name : 'Ahadu Agent'}">Agent</h2>
                <p class="mt-1 text-slate-500" th:text="${listing.agent != null ? listing.agent.agencyName : ''}">Agency</p>
                <p class="mt-4 text-slate-700" th:text="${listing.agent != null ? listing.agent.phone : ''}">Phone</p>
                <p class="text-slate-700" th:text="${listing.agent != null ? listing.agent.user.email : ''}">Email</p>
            </div>
        </aside>
    </section>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
