<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Agent Dashboard | Ahadu Real Estate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&family=Material+Symbols+Outlined&display=swap" rel="stylesheet" />
</head>
<body class="bg-[#fbfaf7] text-slate-900 font-[Inter]">
<header th:replace="~{fragments :: navbar}"></header>
<main class="mx-auto max-w-7xl px-5 py-10 lg:px-10">
    <div th:if="${success}" class="mb-6 rounded-lg bg-teal-50 px-4 py-3 font-medium text-teal-800" th:text="${success}"></div>
    <div th:if="${error}" class="mb-6 rounded-lg bg-red-50 px-4 py-3 font-medium text-red-700" th:text="${error}"></div>
    <div class="grid gap-6 lg:grid-cols-[0.8fr_1.2fr]">
        <section class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
            <p class="text-sm font-bold uppercase tracking-wide text-teal-700">Agent profile</p>
            <h1 class="mt-2 text-3xl font-extrabold font-[Montserrat]" th:text="${agent.name ?: 'Complete your profile'}">Agent Name</h1>
            <p class="mt-2 text-slate-500" th:text="${agent.user.email}">agent@example.com</p>
            <form th:action="@{/agent/profile}" method="post" th:object="${agent}" class="mt-6 grid gap-4">
                <label class="text-sm font-semibold text-slate-600">Full name
                    <input th:field="*{name}" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" />
                </label>
                <label class="text-sm font-semibold text-slate-600">Phone
                    <input th:field="*{phone}" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" />
                </label>
                <label class="text-sm font-semibold text-slate-600">Agency name
                    <input th:field="*{agencyName}" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" />
                </label>
                <label class="text-sm font-semibold text-slate-600">License number
                    <input th:field="*{licenseNumber}" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" />
                </label>
                <button class="rounded-lg bg-slate-900 px-5 py-3 font-bold text-white hover:bg-slate-800" type="submit">Save profile</button>
            </form>
        </section>

        <section class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
            <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                <div>
                    <p class="text-sm font-bold uppercase tracking-wide text-teal-700">Portfolio</p>
                    <h2 class="mt-2 text-3xl font-extrabold font-[Montserrat]">Your posted listings</h2>
                </div>
                <a th:href="@{/agent/listings/new}" class="rounded-lg bg-teal-700 px-5 py-3 font-bold text-white hover:bg-teal-800">Post listing</a>
            </div>
            <div th:if="${listings == null or listings.empty}" class="mt-6 rounded-lg border border-dashed border-slate-300 p-8 text-center text-slate-500">No posted listings yet.</div>
            <div th:unless="${listings == null or listings.empty}" class="mt-6 grid gap-4 md:grid-cols-2">
                <article th:each="listing : ${listings}" class="rounded-lg border border-slate-200 p-4">
                    <img class="mb-4 h-36 w-full rounded-lg object-cover" th:src="${listing.image != null and !listing.image.isBlank() ? listing.image : 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=700&q=80'}" alt="Property" />
                    <div class="flex items-start justify-between gap-2">
                        <div>
                            <h3 class="font-bold" th:text="${listing.title}">Title</h3>
                            <p class="mt-1 text-sm text-slate-500" th:text="${listing.city}">City</p>
                        </div>
                        <span class="text-sm font-bold text-teal-700" th:text="${listing.listingStatus ?: 'For Sale'}">For Sale</span>
                    </div>
                    <div class="mt-4 flex flex-wrap gap-2">
                        <a class="inline-flex rounded-lg border border-slate-300 px-4 py-2 font-semibold hover:bg-slate-50" th:href="@{/agent/listings/{id}(id=${listing.id})}">View</a>
                        <a class="inline-flex rounded-lg border border-teal-700 px-4 py-2 font-semibold text-teal-800 hover:bg-teal-50" th:href="@{/agent/listings/{id}/edit(id=${listing.id})}">Edit</a>
                        <form th:action="@{/agent/listings/{id}/delete(id=${listing.id})}" method="post" onsubmit="return confirm('Delete this listing? Buyers will no longer see it in their requests.');">
                            <button class="inline-flex rounded-lg border border-red-300 px-4 py-2 font-semibold text-red-700 hover:bg-red-50" type="submit">Delete</button>
                        </form>
                    </div>
                </article>
            </div>
        </section>
    </div>

    <section class="mt-8 rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <p class="text-sm font-bold uppercase tracking-wide text-teal-700">Requested properties</p>
        <h2 class="mt-2 text-3xl font-extrabold font-[Montserrat]">Listings you want to buy or rent</h2>
        <div th:if="${requestedListings == null or requestedListings.empty}" class="mt-6 rounded-lg border border-dashed border-slate-300 p-8 text-center text-slate-500">You have not requested another agent's listing yet.</div>
        <div th:unless="${requestedListings == null or requestedListings.empty}" class="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-3">
            <article th:each="listing : ${requestedListings}" class="rounded-lg border border-slate-200 p-4">
                <h3 class="font-bold" th:text="${listing.title}">Title</h3>
                <p class="mt-1 text-sm text-slate-500" th:text="${listing.address + ', ' + listing.city}">Address</p>
                <p class="mt-3 font-extrabold text-teal-700" th:text="${#numbers.formatDecimal(listing.price, 0, 'COMMA', 2, 'POINT')}">0</p>
                <a class="mt-4 inline-flex rounded-lg border border-slate-300 px-4 py-2 font-semibold hover:bg-slate-50" th:href="@{/listings/{id}(id=${listing.id})}">View</a>
            </article>
        </div>
    </section>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
