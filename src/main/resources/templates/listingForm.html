<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title th:text="${formTitle + ' | Ahadu Real Estate'}">List Your Property | Ahadu Real Estate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&family=Material+Symbols+Outlined&display=swap" rel="stylesheet" />
</head>
<body class="bg-[#fbfaf7] text-slate-900 font-[Inter]">
<header th:replace="~{fragments :: navbar}"></header>
<main class="mx-auto max-w-5xl px-5 py-12">
    <div class="mb-8 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <div>
            <p class="text-sm font-bold uppercase tracking-wide text-teal-700">Agent listing studio</p>
            <h1 class="mt-2 text-4xl font-extrabold font-[Montserrat]" th:text="${formTitle}">Publish a property</h1>
            <p class="mt-3 max-w-2xl text-slate-600">Add the details buyers need to evaluate the property and contact you with confidence.</p>
        </div>
        <a th:href="@{/agent/dashboard}" class="rounded-lg border border-slate-300 px-4 py-2 font-semibold text-slate-700 hover:bg-white">Back to dashboard</a>
    </div>

    <form th:action="${formAction}" method="post" enctype="multipart/form-data" th:object="${listing}" class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm md:p-8">
        <div class="grid gap-6 md:grid-cols-2">
            <label class="md:col-span-2 block text-sm font-semibold text-slate-600">Property title
                <input th:field="*{title}" required class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" placeholder="Modern villa in Bole" />
            </label>
            <label class="block text-sm font-semibold text-slate-600">Property type
                <select th:field="*{propertyType}" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700">
                    <option value="Villa">Villa</option>
                    <option value="Apartment">Apartment</option>
                    <option value="Office">Office</option>
                    <option value="Land">Land</option>
                    <option value="Townhouse">Townhouse</option>
                </select>
            </label>
            <label class="block text-sm font-semibold text-slate-600">Listing status
                <select th:field="*{listingStatus}" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700">
                    <option value="For Sale">For Sale</option>
                    <option value="For Rent">For Rent</option>
                </select>
            </label>
            <label class="block text-sm font-semibold text-slate-600">Price
                <input th:field="*{price}" required min="0" step="0.01" type="number" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" placeholder="2500000" />
            </label>
            <label class="block text-sm font-semibold text-slate-600">City
                <input th:field="*{city}" required class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" placeholder="Addis Ababa" />
            </label>
            <label class="md:col-span-2 block text-sm font-semibold text-slate-600">Address
                <input th:field="*{address}" required class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" placeholder="Street, neighborhood, landmark" />
            </label>
            <label class="block text-sm font-semibold text-slate-600">Bedrooms
                <input th:field="*{bedrooms}" min="0" type="number" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" />
            </label>
            <label class="block text-sm font-semibold text-slate-600">Bathrooms
                <input th:field="*{bathrooms}" min="0" type="number" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" />
            </label>
            <label class="block text-sm font-semibold text-slate-600">Area (sqft)
                <input th:field="*{area}" min="0" step="0.01" type="number" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" />
            </label>
            <div class="block text-sm font-semibold text-slate-600">
                Property image
                <input name="imageFile" type="file" accept="image/png,image/jpeg,image/webp,image/gif" th:required="${isEdit == false}" class="mt-2 w-full rounded-lg border border-slate-300 bg-slate-50 px-4 py-3 file:mr-4 file:rounded-lg file:border-0 file:bg-teal-700 file:px-4 file:py-2 file:font-bold file:text-white hover:file:bg-teal-800" />
                <p class="mt-2 text-xs font-normal text-slate-500">Upload an image from your computer. Links are no longer accepted.</p>
            </div>
            <div th:if="${isEdit == true and currentImage != null}" class="md:col-span-2 rounded-lg border border-slate-200 bg-slate-50 p-4">
                <p class="mb-3 text-sm font-semibold text-slate-600">Current image</p>
                <img class="h-52 w-full rounded-lg object-cover" th:src="${currentImage}" alt="Current property image" />
            </div>
            <label class="md:col-span-2 block text-sm font-semibold text-slate-600">Description
                <textarea th:field="*{description}" rows="6" required class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" placeholder="Describe amenities, finishes, nearby services, and why this property stands out."></textarea>
            </label>
        </div>
        <div class="mt-8 flex flex-col gap-3 border-t border-slate-200 pt-6 sm:flex-row">
            <button class="inline-flex items-center justify-center gap-2 rounded-lg bg-teal-700 px-6 py-3 font-bold text-white hover:bg-teal-800" type="submit">
                <span class="material-symbols-outlined" th:text="${isEdit == true ? 'save' : 'publish'}">publish</span>
                <span th:text="${submitLabel}">Publish listing</span>
            </button>
            <a th:href="@{/agent/dashboard}" class="inline-flex items-center justify-center rounded-lg border border-slate-300 px-6 py-3 font-bold text-slate-700 hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
