  <head>

              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",
              "on-surface": "#1b1b1d",
              background: "#fbf8fa",
              "primary-fixed-dim": "#bcc7de",
              "surface-container-low": "#f5f3f4",
              "outline-variant": "#c5c6cd",
              "inverse-surface": "#303032",
              "on-primary-container": "#8590a6",
              "primary-container": "#1e293b",
              "error-container": "#ffdad6",
              "on-tertiary-fixed-variant": "#564427",

            borderRadius: {

              gutter: "24px",

            fontFamily: {

          },

    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body
    class="bg-background text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center relative overflow-x-hidden"
  >
    <!-- Background Layer with Image -->
    <div class="absolute inset-0 z-0 opacity-10">
      <img
        alt=""
        class="w-full h-full object-cover"
        data-alt="An expansive, high-angle architectural photograph of a modern glass skyscraper reflecting a clear blue sky. The image emphasizes clean lines, structural authority, and professional sophistication using a palette of deep blues and cool grays. The lighting is bright and airy, typical of a high-end light-mode real estate aesthetic, conveying stability and premium service."
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuB63O1288UNxqOwN2CpAb8FYczrwEI8IrlwfrsDYbBWH01E5TDogvmZG3GG6cd0taBRn6bgiVQy-qPILp-ztFhjzYf3Fv_z3ZsBaKlOahpXIBXNostH6OsfdlSKJbIBI-Yz9vRGxmWu6e0nVFpBWEVLx2JNLKarSYOmgcLdix-aqNjfQt6C8Bp4ip6CrEBDX7VqSedKyQatn3HYVR5wKU2CxR2vZbKTFlIX6s3e2hQU46lf6eZks5C615d7rWr7rflWWgJw4z8zSzM"
      />
    </div>
    <!-- Login Container -->
    <main class="w-full max-w-md px-margin-mobile md:px-0 z-10">
      <!-- Brand Logo Header -->
      <div class="flex justify-center mb-8">
        <a
          class="flex items-center gap-2 group transition-transform active:scale-95"
          href="/"
        >
          <span class="material-symbols-outlined text-secondary text-3xl"
            >apartment</span
          >
          <span class="font-headline-md text-headline-sm font-bold text-primary"
            >Ahadu Real Estate</span
          >
        </a>
      </div>
      <!-- Login Card -->
      <div
        class="glass-panel border border-outline-variant shadow-[0px_12px_32px_rgba(30,41,59,0.08)] rounded-2xl p-8 md:p-10"
      >
        <header class="text-center mb-8">
          <h1 class="font-headline-md text-headline-md text-primary mb-2">
            Welcome Back
          </h1>
          <p class="font-body-md text-on-surface-variant">
            Login to your account
          </p>
        </header>
        <!-- Alert Message Box -->
        <div
          class="hidden font-label-md p-4 rounded-xl mb-6 flex items-center gap-3 transition-all duration-300"
          id="message"
        >
          <!-- Icon and Text injected via JS -->
        </div>
        <form class="space-y-6" id="loginForm">
          <!-- Email Field -->
          <div class="space-y-2">
            <label
              class="block font-label-md text-on-surface-variant ml-1"
              for="email"
              >Email Address</label
            >
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline"
                >mail</span
              >
              <input
                class="w-full pl-12 pr-4 py-3 bg-surface-container-low border-transparent border-2 rounded-xl focus:border-secondary focus:bg-white focus:ring-0 transition-all text-on-surface font-body-md placeholder:text-outline-variant"
                id="email"
                name="email"
                placeholder="name@example.com"
                required=""
                type="email"
              />
            </div>
          </div>
          <!-- Password Field -->
          <div class="space-y-2">
            <div class="flex justify-between items-center px-1">
              <label
                class="font-label-md text-on-surface-variant"
                for="password"
                >Password</label
              >
              <a
                class="text-label-sm text-secondary hover:underline transition-all"
                href="/forgot-password"
                >Forgot password?</a
              >
            </div>
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline"
                >lock</span
              >
              <input
                class="w-full pl-12 pr-4 py-3 bg-surface-container-low border-transparent border-2 rounded-xl focus:border-secondary focus:bg-white focus:ring-0 transition-all text-on-surface font-body-md placeholder:text-outline-variant"
                id="password"
                name="password"
                placeholder="••••••••"
                required=""
                type="password"
              />
            </div>
          </div>
          <!-- Remember Me -->
          <div class="flex items-center px-1">
            <input
              class="w-4 h-4 rounded border-outline-variant text-secondary focus:ring-secondary cursor-pointer"
              id="remember"
              type="checkbox"
            />
            <label
              class="ml-2 font-label-md text-on-surface-variant cursor-pointer"
              for="remember"
              >Keep me logged in</label
            >
          </div>
          <!-- Submit Button -->
          <button
            class="w-full bg-secondary hover:bg-on-secondary-container text-white font-label-md py-4 rounded-2xl shadow-lg transition-all active:scale-[0.98] flex justify-center items-center gap-2"
            id="submitBtn"
            type="submit"
          >
            <span>Login</span>
            <span class="material-symbols-outlined text-lg">arrow_forward</span>
          </button>
        </form>
        <!-- Register Link -->
        <footer class="mt-8 pt-8 border-t border-outline-variant text-center">
          <p class="font-body-md text-on-surface-variant">
            Don't have an account?
            <a
              class="text-secondary font-semibold hover:underline decoration-2 underline-offset-4 ml-1"
              href="/register"
              >Register</a
            >
          </p>
        </footer>
      </div>
      <!-- Secondary Footer Links -->
      <div class="mt-8 flex justify-center gap-6 font-label-sm text-outline">
        <a class="hover:text-primary transition-colors" href="/terms"
          >Terms of Service</a
        >
        <span class="w-1 h-1 rounded-full bg-outline-variant mt-1.5"></span>
        <a class="hover:text-primary transition-colors" href="/privacy"
          >Privacy Policy</a
        >
        <span class="w-1 h-1 rounded-full bg-outline-variant mt-1.5"></span>
        <a class="hover:text-primary transition-colors" href="/support"
          >Contact Support</a
        >
      </div>
    </main>
    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const messageDiv = document.getElementById("message");
          const submitBtn = document.getElementById("submitBtn");
          const submitBtnText = submitBtn.querySelector("span:first-child");

          // UI Reset & Loading State
          messageDiv.classList.add("hidden");
          messageDiv.className =
            "hidden p-4 rounded-xl mb-6 flex items-center gap-3 transition-all duration-300";
          submitBtn.disabled = true;
          submitBtn.classList.add("opacity-70", "cursor-not-allowed");
          submitBtnText.textContent = "Authenticating...";

          try {
            const response = await fetch("/auth/login", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ email, password }),
            });

            const data = await response.json();

            if (response.ok) {
              // Success State
              messageDiv.classList.remove("hidden");
              messageDiv.classList.add(
                "bg-secondary-container",
                "text-on-secondary-container",
              );
              messageDiv.innerHTML = `
                        <span class="material-symbols-outlined">check_circle</span>
                        <span>Login successful. Redirecting to your dashboard...</span>
                    `;

              // Delay for visual feedback then redirect
              setTimeout(() => {
                window.location.href = "/dashboard";
              }, 1500);
            } else {
              // Business Logic Error (Invalid Credentials etc)
              throw new Error(
                data.message ||
                  "The email or password you entered is incorrect.",
              );
            }
          } catch (error) {
            // Error State
            messageDiv.classList.remove("hidden");
            messageDiv.classList.add(
              "bg-error-container",
              "text-on-error-container",
            );
            messageDiv.innerHTML = `
                    <span class="material-symbols-outlined">error</span>
                    <span>${error.message}</span>
                `;

            // Reset Button
            submitBtn.disabled = false;
            submitBtn.classList.remove("opacity-70", "cursor-not-allowed");
            submitBtnText.textContent = "Login";
          }
        });

      // Add subtle focus effect on labels
      const inputs = document.querySelectorAll("input");
      inputs.forEach((input) => {
        input.addEventListener("focus", () => {
          input
            .closest(".space-y-2")
            .querySelector("label")
            .classList.add("text-secondary");
        });
        input.addEventListener("blur", () => {
          input
            .closest(".space-y-2")
            .querySelector("label")
            .classList.remove("text-secondary");
        });
      });
    </script>
  </body>
</html>
