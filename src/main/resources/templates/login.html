<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | Ahadu Real Estate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&family=Material+Symbols+Outlined&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen bg-[#f7f5f0] font-[Inter] text-slate-900">
<main class="min-h-screen grid lg:grid-cols-2">
    <section class="hidden lg:block relative overflow-hidden">
        <img class="absolute inset-0 h-full w-full object-cover" src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&w=1600&q=80" alt="Modern real estate interior" />
        <div class="absolute inset-0 bg-slate-950/45"></div>
        <div class="relative z-10 flex h-full flex-col justify-end p-14 text-white">
            <a th:href="@{/}" class="mb-auto text-2xl font-bold font-[Montserrat]">Ahadu Real Estate</a>
            <h1 class="max-w-xl text-5xl font-extrabold font-[Montserrat] leading-tight">Manage property requests and listings from one place.</h1>
        </div>
    </section>
    <section class="flex items-center justify-center px-5 py-12">
        <div class="w-full max-w-md rounded-lg border border-slate-200 bg-white p-8 shadow-sm">
            <a th:href="@{/}" class="mb-8 inline-flex items-center gap-2 text-slate-900">
                <span class="material-symbols-outlined text-teal-700">apartment</span>
                <span class="font-bold font-[Montserrat]">Ahadu Real Estate</span>
            </a>
            <h1 class="text-3xl font-bold font-[Montserrat]">Welcome back</h1>
            <p class="mt-2 text-slate-500">Login with the account you registered as a buyer or agent.</p>

            <div th:if="${param.error}" class="mt-6 rounded-lg bg-red-50 px-4 py-3 text-sm font-medium text-red-700">Invalid email or password.</div>
            <div th:if="${param.logout}" class="mt-6 rounded-lg bg-teal-50 px-4 py-3 text-sm font-medium text-teal-800">You have been logged out.</div>

            <form class="mt-8 space-y-5" th:action="@{/perform-login}" method="post">
                <div>
                    <label class="text-sm font-semibold text-slate-600" for="username">Email address</label>
                    <input class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" id="username" name="username" type="email" required placeholder="name@example.com" />
                </div>
                <div>
                    <label class="text-sm font-semibold text-slate-600" for="password">Password</label>
                    <input class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" id="password" name="password" type="password" required placeholder="Password" />
                </div>
                <button class="flex w-full items-center justify-center gap-2 rounded-lg bg-teal-700 px-5 py-3 font-bold text-white transition hover:bg-teal-800" type="submit">
                    Login
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
                </button>
            </form>
            <p class="mt-8 border-t border-slate-200 pt-6 text-center text-slate-500">No account yet? <a class="font-semibold text-teal-700 hover:underline" th:href="@{/register}">Register</a></p>
        </div>
    </section>
</main>
</body>
</html>
