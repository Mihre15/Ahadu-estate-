<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Buyer Profile | Ahadu Real Estate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&family=Material+Symbols+Outlined&display=swap" rel="stylesheet" />
</head>
<body class="bg-[#fbfaf7] text-slate-900 font-[Inter]">
<header th:replace="~{fragments :: navbar}"></header>
<main class="mx-auto max-w-7xl px-5 py-10 lg:px-10">
    <div th:if="${success}" class="mb-6 rounded-lg bg-teal-50 px-4 py-3 font-medium text-teal-800" th:text="${success}"></div>
    <div class="grid gap-6 lg:grid-cols-[0.75fr_1.25fr]">
        <section class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
            <p class="text-sm font-bold uppercase tracking-wide text-teal-700">Buyer profile</p>
            <h1 class="mt-2 text-3xl font-extrabold font-[Montserrat]" th:text="${buyer.name ?: 'Complete your profile'}">Buyer Name</h1>
            <p class="mt-2 text-slate-500" th:text="${userEmail}">buyer@example.com</p>
            <form th:action="@{/buyer/profile}" method="post" th:object="${buyer}" class="mt-6 grid gap-4">
                <label class="text-sm font-semibold text-slate-600">Full name
                    <input th:field="*{name}" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" />
                </label>
                <label class="text-sm font-semibold text-slate-600">Phone
                    <input th:field="*{phone}" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" />
                </label>
                <label class="text-sm font-semibold text-slate-600">Preferred city
                    <input th:field="*{preferredCity}" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" />
                </label>
                <div class="grid gap-4 sm:grid-cols-2">
                    <label class="text-sm font-semibold text-slate-600">Min budget
                        <input th:field="*{budgetMin}" type="number" step="0.01" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" />
                    </label>
                    <label class="text-sm font-semibold text-slate-600">Max budget
                        <input th:field="*{budgetMax}" type="number" step="0.01" class="mt-2 w-full rounded-lg border-slate-300 bg-slate-50 px-4 py-3 focus:border-teal-700 focus:ring-teal-700" />
                    </label>
                </div>
                <button class="rounded-lg bg-slate-900 px-5 py-3 font-bold text-white hover:bg-slate-800" type="submit">Save profile</button>
            </form>
        </section>

        <section class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
            <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
                <div>
                    <p class="text-sm font-bold uppercase tracking-wide text-teal-700">Buying requests</p>
                    <h2 class="mt-2 text-3xl font-extrabold font-[Montserrat]">Listings you asked to buy or rent</h2>
                </div>
                <a th:href="@{/listings}" class="rounded-lg bg-teal-700 px-5 py-3 font-bold text-white hover:bg-teal-800">Browse listings</a>
            </div>
            <div th:if="${requestedListings == null or requestedListings.empty}" class="mt-6 rounded-lg border border-dashed border-slate-300 p-10 text-center">
                <h3 class="text-xl font-bold">No requested listings yet</h3>
                <p class="mt-2 text-slate-500">Open a property and click request to keep it in your profile.</p>
            </div>
            <div th:unless="${requestedListings == null or requestedListings.empty}" class="mt-6 grid gap-4 md:grid-cols-2">
                <article th:each="listing : ${requestedListings}" class="rounded-lg border border-slate-200 p-4">
                    <img class="mb-4 h-40 w-full rounded-lg object-cover" th:src="${listing.image != null and !listing.image.isBlank() ? listing.image : 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=700&q=80'}" alt="Property" />
                    <h3 class="font-bold" th:text="${listing.title}">Title</h3>
                    <p class="mt-1 text-sm text-slate-500" th:text="${listing.address + ', ' + listing.city}">Address</p>
                    <p class="mt-3 font-extrabold text-teal-700" th:text="${#numbers.formatDecimal(listing.price, 0, 'COMMA', 2, 'POINT')}">0</p>
                    <a class="mt-4 inline-flex rounded-lg border border-slate-300 px-4 py-2 font-semibold hover:bg-slate-50" th:href="@{/listings/{id}(id=${listing.id})}">View details</a>
                </article>
            </div>
        </section>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
